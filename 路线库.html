<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>云途视界 · 路线库</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    background: #0f0f1a;
    color: #e0e0e0;
    padding: 20px;
  }
  .container { max-width: 1200px; margin: 0 auto; }

  /* Header */
  .header {
    text-align: center;
    padding: 30px 0;
  }
  .header h1 {
    font-size: 28px;
    color: #FF6B35;
    margin-bottom: 6px;
  }
  .header .sub { color: #888; font-size: 14px; }

  /* Stats bar */
  .stats {
    display: flex;
    gap: 12px;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 24px;
  }
  .stat-card {
    background: #1a1a2e;
    border: 1px solid #2a2a4a;
    border-radius: 10px;
    padding: 14px 20px;
    text-align: center;
    min-width: 90px;
  }
  .stat-card .num { font-size: 26px; font-weight: 700; }
  .stat-card .label { font-size: 12px; color: #888; margin-top: 2px; }
  .stat-card.total .num { color: #FF6B35; }
  .stat-card.active .num { color: #4CAF50; }
  .stat-card.unexplored .num { color: #FF9800; }

  /* Filters */
  .filters {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 20px;
    align-items: center;
    justify-content: center;
  }
  .filters select, .filters input {
    background: #1a1a2e;
    border: 1px solid #2a2a4a;
    color: #e0e0e0;
    padding: 8px 14px;
    border-radius: 8px;
    font-size: 14px;
    outline: none;
  }
  .filters select:focus, .filters input:focus { border-color: #FF6B35; }
  .filters input { width: 200px; }
  .filters input::placeholder { color: #666; }

  /* Table */
  .table-wrap {
    background: #1a1a2e;
    border: 1px solid #2a2a4a;
    border-radius: 12px;
    overflow: hidden;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  thead th {
    background: #12122a;
    padding: 12px 10px;
    text-align: left;
    font-weight: 600;
    color: #aaa;
    border-bottom: 1px solid #2a2a4a;
    white-space: nowrap;
    cursor: pointer;
    user-select: none;
  }
  thead th:hover { color: #FF6B35; }
  thead th .arrow { font-size: 10px; margin-left: 4px; }
  tbody td {
    padding: 10px;
    border-bottom: 1px solid #1f1f3a;
    vertical-align: middle;
  }
  tbody tr:hover { background: #1f1f3a; }
  tbody tr.unexplored { opacity: 0.45; }
  tbody tr.unexplored:hover { opacity: 0.7; }

  /* Badges */
  .badge {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
  }
  .badge-active { background: #1b5e20; color: #81C784; }
  .badge-unexplored { background: #4a2800; color: #FFB74D; }
  .badge-type {
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 11px;
    white-space: nowrap;
  }
  .type-徒步 { background: #1a237e; color: #90CAF9; }
  .type-爬山 { background: #4a148c; color: #CE93D8; }
  .type-探洞 { background: #1b5e20; color: #A5D6A7; }
  .type-溯溪 { background: #01579b; color: #81D4FA; }

  /* Stars */
  .stars { color: #FFB74D; white-space: nowrap; }
  .scenery { color: #4FC3F7; white-space: nowrap; }

  /* Difficulty bar */
  .diff-bar {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .diff-bar .s { color: #FFB74D; }
  .diff-bar .r { color: #90CAF9; font-size: 11px; margin-left: 2px; }

  .count { color: #888; font-size: 12px; margin-left: 8px; }

  /* Responsive */
  @media (max-width: 768px) {
    body { padding: 10px; }
    .stats { gap: 8px; }
    .stat-card { padding: 10px 14px; min-width: 70px; }
    .stat-card .num { font-size: 20px; }
    .filters { flex-direction: column; align-items: stretch; }
    .filters input { width: 100%; }
    .table-wrap { overflow-x: auto; }
    table { font-size: 11px; }
    thead th, tbody td { padding: 8px 6px; }
  }
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <h1>云途视界 · 路线库</h1>
    <div class="sub">重庆周边 + 川西 + 赤水 ｜ 共 41 条路线 ｜ 更新于 2026-05-21</div>
  </div>

  <div class="stats" id="stats"></div>

  <div class="filters">
    <select id="filterRegion"><option value="">全部区域</option></select>
    <select id="filterType"><option value="">全部类型</option></select>
    <select id="filterStatus"><option value="">全部状态</option><option value="active">已探线</option><option value="unexplored">未探线</option></select>
    <select id="filterNovice"><option value="">全部难度</option><option value="true">适合新手</option><option value="false">不适合新手</option></select>
    <input id="searchInput" placeholder="搜索路线名称..." type="text">
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th data-sort="name">路线名称 <span class="arrow"></span></th>
          <th data-sort="region">区域</th>
          <th data-sort="type">类型</th>
          <th data-sort="distance">里程(km)</th>
          <th data-sort="elevation">爬升(m)</th>
          <th data-sort="difficulty">难度</th>
          <th data-sort="scenery">风景</th>
          <th data-sort="status">状态</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>

</div>

let sortKey = null;
let sortDir = 1;

function starStr(n, cls) {
  if (n === null) return '<span style="color:#666">—</span>';
  let s = '';
  for (let i = 0; i < 5; i++) s += i < n ? '★' : '☆';
  return `<span class="${cls}">${s}</span>`;
}

function renderStats(filtered) {
  const total = DATA.length;
  const active = DATA.filter(r => r.status === 'active').length;
  const unexplored = DATA.filter(r => r.status === 'unexplored').length;
  document.getElementById('stats').innerHTML = `
    <div class="stat-card total"><div class="num">${filtered.length}</div><div class="label">当前显示</div></div>
    <div class="stat-card active"><div class="num">${active}</div><div class="label">已探线</div></div>
    <div class="stat-card unexplored"><div class="num">${unexplored}</div><div class="label">未探线</div></div>
    <div class="stat-card"><div class="num" style="color:#CE93D8">${total}</div><div class="label">路线总数</div></div>
  `;
}

function renderTable() {
  const filters = {
    region: document.getElementById('filterRegion').value,
    type: document.getElementById('filterType').value,
    status: document.getElementById('filterStatus').value,
    novice: document.getElementById('filterNovice').value,
    search: document.getElementById('searchInput').value.toLowerCase()
  };

  let filtered = DATA.filter(r => {
    if (filters.region && r.region !== filters.region) return false;
    if (filters.type && r.type !== filters.type) return false;
    if (filters.status && r.status !== filters.status) return false;
    if (filters.novice && String(r.novice_friendly) !== filters.novice) return false;
    if (filters.search && !r.name.toLowerCase().includes(filters.search)) return false;
    return true;
  });

  if (sortKey) {
    filtered.sort((a, b) => {
      let va = a[sortKey], vb = b[sortKey];
      if (va === null) va = -1;
      if (vb === null) vb = -1;
      if (typeof va === 'string') va = va.toLowerCase();
      if (typeof vb === 'string') vb = vb.toLowerCase();
      return (va > vb ? 1 : va < vb ? -1 : 0) * sortDir;
    });
  }

  const tbody = document.getElementById('tableBody');
  tbody.innerHTML = filtered.map(r => `
    <tr class="${r.status === 'unexplored' ? 'unexplored' : ''}">
      <td><strong>${r.name}</strong>${r.start_point ? `<br><span style="color:#888;font-size:11px">📍 ${r.start_point}</span>` : ''}</td>
      <td>${r.region}</td>
      <td><span class="badge-type type-${r.type}">${r.type}</span></td>
      <td>${r.distance_km}</td>
      <td>${r.elevation_gain_m}</td>
      <td>
        <div class="diff-bar">
          <span>${starStr(r.difficulty_stars, 's')}</span>
          ${r.difficulty_rainy_stars !== null && r.difficulty_rainy_stars !== undefined ? `<span class="r">☔${starStr(r.difficulty_rainy_stars, 's')}</span>` : ''}
        </div>
      </td>
      <td>
        <div class="diff-bar">
          <span>${starStr(r.scenery_stars, 'scenery')}</span>
          ${r.scenery_rainy_stars !== null && r.scenery_rainy_stars !== undefined ? `<span class="r">☔${starStr(r.scenery_rainy_stars, 'scenery')}</span>` : ''}
        </div>
      </td>
      <td><span class="badge badge-${r.status === 'active' ? 'active' : 'unexplored'}">${r.status === 'active' ? '已探' : '未探'}</span></td>
    </tr>
  `).join('');

  document.getElementById('stats').querySelector('.stat-card.total .num').textContent = filtered.length;
}

function populateFilters() {
  const regions = [...new Set(DATA.map(r => r.region))].sort();
  const types = [...new Set(DATA.map(r => r.type))].sort();
  const regionSel = document.getElementById('filterRegion');
  const typeSel = document.getElementById('filterType');
  regions.forEach(r => { const o = document.createElement('option'); o.value = r; o.textContent = r; regionSel.appendChild(o); });
  types.forEach(t => { const o = document.createElement('option'); o.value = t; o.textContent = t; typeSel.appendChild(o); });
}

document.querySelectorAll('#filterRegion, #filterType, #filterStatus, #filterNovice').forEach(el => el.addEventListener('change', renderTable));
document.getElementById('searchInput').addEventListener('input', renderTable);

document.querySelectorAll('thead th[data-sort]').forEach(th => {
  th.addEventListener('click', () => {
    const key = th.dataset.sort;
    if (sortKey === key) { sortDir *= -1; }
    else { sortKey = key; sortDir = 1; }
    document.querySelectorAll('thead th .arrow').forEach(a => a.textContent = '');
    th.querySelector('.arrow').textContent = sortDir === 1 ? '▲' : '▼';
    renderTable();
  });
});

populateFilters();
renderStats(DATA);
renderTable();
</script>
</body>
</html>
